<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f97316" />
<title>Abrir o Chamô</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Plus Jakarta Sans", sans-serif;
    background: linear-gradient(160deg, #f97316 0%, #ea580c 55%, #c2410c 100%);
    color: #fff; min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center; overflow: hidden;
  }
  .wrap { width: 100%; max-width: 360px; position: relative; z-index: 1; }
  .blob { position: fixed; border-radius: 9999px; background: rgba(255,255,255,.10); filter: blur(2px); }
  .blob1 { width: 220px; height: 220px; top: -70px; right: -60px; }
  .blob2 { width: 180px; height: 180px; bottom: -60px; left: -50px; background: rgba(255,255,255,.06); }
  .logo {
    width: 96px; height: 96px; border-radius: 26px; object-fit: cover;
    box-shadow: 0 12px 40px rgba(0,0,0,.25); border: 2px solid rgba(255,255,255,.25);
    margin: 0 auto 20px; display: block; background:#fff;
  }
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 8px; }
  p.sub { font-size: 15px; opacity: .9; line-height: 1.45; margin-bottom: 28px; }
  .spinner {
    width: 34px; height: 34px; border: 3px solid rgba(255,255,255,.35); border-top-color: #fff;
    border-radius: 50%; margin: 8px auto 0; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .download { display: none; }
  .download.show { display: block; animation: fade .35s ease; }
  .opening.hide { display: none; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .card { background: #fff; color: #1f1300; border-radius: 22px; padding: 26px 22px; box-shadow: 0 16px 50px rgba(0,0,0,.22); }
  .card h2 { font-size: 19px; font-weight: 800; margin-bottom: 8px; color:#111; }
  .card p { font-size: 14px; color: #5b5048; line-height: 1.5; margin-bottom: 20px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 15px 18px; border-radius: 16px; font-size: 16px; font-weight: 700;
    text-decoration: none; margin-bottom: 12px; transition: transform .12s ease;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: #f97316; color: #fff; }
  .btn-dark { background: #111; color: #fff; }
  .btn svg { width: 22px; height: 22px; flex: none; }
  .open-link { display:inline-block; margin-top: 6px; color: #f97316; font-weight: 700; font-size: 14px; text-decoration: none; }
  .foot { margin-top: 18px; font-size: 12px; opacity: .8; }
</style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="wrap">
    <img class="logo" src="/icon-512.png" alt="Chamô" />

    <div id="opening" class="opening">
      <h1>Abrindo o Chamô…</h1>
      <p class="sub">Se o app não abrir automaticamente, toque no botão abaixo.</p>
      <div class="spinner"></div>
      <a class="open-link" href="#" id="openBtn">Abrir no app</a>
    </div>

    <div id="download" class="download">
      <div class="card">
        <h2>Não tem o app Chamô?</h2>
        <p>Baixe grátis e encontre profissionais e serviços perto de você, em Patrocínio-MG. 🧡</p>

        <a class="btn btn-dark" id="iosBtn" href="https://apps.apple.com/br/app/cham%C3%B4-app/id6759582451">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.467 2.22-1.225 3.01-.812.84-2.143 1.49-3.243 1.4-.13-1.1.42-2.27 1.16-3.01.83-.85 2.26-1.47 3.31-1.4zM20.5 17.02c-.55 1.27-.81 1.83-1.52 2.95-.99 1.57-2.38 3.52-4.11 3.53-1.53.02-1.93-1-4.01-.99-2.08.01-2.51 1.01-4.05.99-1.73-.01-3.05-1.77-4.04-3.34C-.16 16.96-.43 11.5 1.39 8.84 2.69 6.95 4.74 5.86 6.66 5.86c1.96 0 3.19 1.07 4.81 1.07 1.57 0 2.53-1.07 4.8-1.07 1.71 0 3.52.93 4.81 2.54-4.23 2.32-3.54 8.36-.58 8.62z"/></svg>
          Baixar para iOS
        </a>
        <a class="btn btn-primary" id="androidBtn" href="https://play.google.com/store/apps/details?id=com.chamo.app">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 1.8c-.3.3-.5.7-.5 1.2v18c0 .5.2.9.5 1.2l.1.1L13.4 12.5v-.1L3.7 1.7l-.1.1zM17 8.8l-2.7-1.6-2.6 2.6 2.6 2.6L17 10.8c.8-.5.8-1.5 0-2zm-2.7 4.9l-2.6-2.6L4 19.9c.3.3.7.3 1.1.1l9.2-5.3zM5.1 3.9c-.4-.2-.8-.2-1.1.1l8.3 8.3 2.6-2.6L5.1 3.9z"/></svg>
          Baixar para Android
        </a>
        <a class="open-link" href="#" id="openBtn2">Já tenho o app — abrir</a>
      </div>
      <p class="foot">Chamô · Conectando você a quem resolve</p>
    </div>
  </div>

<script>
  // Esquema do app (deep link). Abre o Chamô se estiver instalado.
  var APP_SCHEME = "com.chamo.app://";
  var ua = navigator.userAgent || "";
  var isIOS = /iPad|iPhone|iPod/.test(ua);
  var isAndroid = /Android/.test(ua);
  var isMobile = isIOS || isAndroid;

  function tryOpenApp() {
    try { window.location.href = APP_SCHEME; } catch (e) {}
  }

  // Ajusta os botões da loja conforme o sistema
  var iosBtn = document.getElementById("iosBtn");
  var androidBtn = document.getElementById("androidBtn");
  if (isIOS) { androidBtn.style.display = "none"; }
  else if (isAndroid) { iosBtn.style.display = "none"; }

  // Botões manuais
  document.getElementById("openBtn").addEventListener("click", function (e) { e.preventDefault(); tryOpenApp(); });
  document.getElementById("openBtn2").addEventListener("click", function (e) { e.preventDefault(); tryOpenApp(); });

  function showDownload() {
    document.getElementById("opening").classList.add("hide");
    document.getElementById("download").classList.add("show");
  }

  if (isMobile) {
    // Tenta abrir o app na hora.
    tryOpenApp();
    // Se continuar na página (app não instalado), mostra o download.
    var t = setTimeout(showDownload, 2200);
    // Se o usuário sair (app abriu), cancela o fallback.
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) clearTimeout(t);
    });
    window.addEventListener("pagehide", function () { clearTimeout(t); });
  } else {
    // Desktop: mostra direto o download (não dá pra abrir o app).
    showDownload();
  }
</script>
</body>
</html>
